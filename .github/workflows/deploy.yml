name: Deploy SecDriveNG Backend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1. Upload source files via SFTP ──────────────────────────────────────
      # Excludes venv, __pycache__, .pyc, media, staticfiles, and local .env
      - name: SFTP Deploy
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.VPS_USER }}
          server: ${{ secrets.VPS_HOST }}
          port: 22
          password: ${{ secrets.VPS_PASS }}
          local_path: "./*"
          remote_path: "/var/www/secdriveng-api/"
          sftpArgs: >-
            -o StrictHostKeyChecking=no
            -o ConnectTimeout=30

      # ── 2. Post-deploy: install deps, migrate, collect static, restart ────────
      - name: Post-deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASS }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            cd /var/www/secdriveng-api

            echo "--- Setting up virtual environment ---"
            if [ ! -d "venv" ]; then
              python3 -m venv venv
              echo "venv created."
            fi
            source venv/bin/activate

            echo "--- Installing dependencies ---"
            pip install --upgrade pip --quiet
            pip install -r requirements.txt --quiet

            echo "--- Running migrations ---"
            python manage.py migrate --no-input

            echo "--- Creating superuser (skips if already exists) ---"
            DJANGO_SUPERUSER_USERNAME="secdriveadmin" \
            DJANGO_SUPERUSER_EMAIL="admin@secdriveng.com" \
            DJANGO_SUPERUSER_PASSWORD="${{ secrets.SUPERUSER_PASS }}" \
            python manage.py createsuperuser --noinput 2>/dev/null \
              && echo "Superuser created." \
              || echo "Superuser already exists, skipping."

            echo "--- Collecting static files ---"
            python manage.py collectstatic --no-input --clear

            echo "--- Restarting services ---"
            systemctl restart secdriveng-api.service
            systemctl status secdriveng-api.service --no-pager

            echo "✅ Deploy complete."
