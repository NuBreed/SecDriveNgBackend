name: Deploy Django Backend to secdrive.ng

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 1. Upload source files via SFTP ──────────────────────────────────────
      # Excludes venv, __pycache__, .pyc, media, staticfiles, celery schedule
      # files, and local .env — none of these belong on the server via SFTP.
      - name: SFTP Deploy
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          username: ${{ secrets.FTP_BACK_USER }}
          server: ${{ secrets.FTP_HOST }}
          port: 22
          password: ${{ secrets.FTP_BACK_PASS }}
          local_path: "./*"
          remote_path: "/home/secdrive/domains/api.secdrive.ng/backend/"
          sftp_args: >-
            -o StrictHostKeyChecking=no
            -o ConnectTimeout=30

      # ── 2. Post-deploy: install deps, migrate, restart services ──────────────
      - name: Post-deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_BACK_USER }}
          password: ${{ secrets.FTP_BACK_PASS }}
          port: 22
          command_timeout: 10m
          script: |
            set -e
            cd /home/secdrive/domains/api.secdrive.ng/backend

            echo "--- Ensuring system GDAL is installed ---"
            if ! command -v gdal-config &>/dev/null; then
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y gdal-bin libgdal-dev --quiet
            fi

            echo "--- Setting up virtual environment ---"
            if [ ! -d "venv" ]; then
              python3 -m venv venv
              echo "venv created."
            fi
            source venv/bin/activate

            echo "--- Installing dependencies ---"
            pip install --upgrade pip --quiet

            pip install -r requirements.txt --quiet

            echo "--- Running migrations ---"
            python manage.py migrate --no-input

            echo "--- Creating superuser (skips if already exists) ---"
            DJANGO_SUPERUSER_USERNAME="secdriveadmin" \
            DJANGO_SUPERUSER_EMAIL="admin@secdrive.ng" \
            DJANGO_SUPERUSER_PASSWORD="Paskey23@" \
            python manage.py createsuperuser --noinput 2>/dev/null \
              && echo "Superuser created." \
              || echo "Superuser already exists, skipping."

            echo "--- Collecting static files ---"
            python manage.py collectstatic --no-input --clear

            echo "✅ Deploy complete."
